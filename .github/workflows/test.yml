name: test
on:
  workflow_call:
    inputs:
      go:
        description: "Go version"
        default: "oldstable"
        required: false
        type: string
      enable-386:
        description: "Add 386 to test matrix"
        default: true
        required: false
        type: boolean
      enable-arm64:
        description: "Add arm64 to test matrix"
        default: false
        required: false
        type: boolean
      submodules:
        description: "Whether to checkout submodules"
        default: true
        required: false
        type: boolean
      runners:
        description: "JSON array of runners for the main test matrix"
        default: '["ubuntu-latest", "macos-latest", "windows-latest"]'
        required: false
        type: string
      test-args:
        description: "Extra arguments for go test"
        default: ""
        required: false
        type: string
      timeout-minutes:
        description: "Job timeout in minutes (minimum 15)"
        default: 30
        required: false
        type: number

jobs:
  run:
    timeout-minutes: ${{ inputs.timeout-minutes }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        flags: [""]
        arch:
          - amd64
        runner: ${{ fromJson(inputs.runners) }}
        go:
          - ${{ inputs.go }}
        include:
          # Hacky expression: if enable-386 is true, value is '386'
          # Otherwise, value is 'amd64'.
          # Actions runner would handle duplicate combination fine.
          - arch: ${{ inputs.enable-386 && '386' || 'amd64' }}
            runner: ubuntu-latest
            go: ${{ inputs.go }}
          - arch: amd64
            runner: ubuntu-latest
            flags: "-race"
            go: ${{ inputs.go }}
          - arch: ${{ inputs.enable-arm64 && 'arm64' || 'amd64' }}
            runner: ubuntu-latest${{ inputs.enable-arm64 && '-arm64' || '' }}
            go: ${{ inputs.go }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: ${{ inputs.submodules }}

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Get Go environment
        id: go-env
        shell: bash
        run: |
          echo "cache=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $GITHUB_ENV

        # Build cache key prefix, using runner OS and arch.
      - name: Compute cache prefix
        id: cache-prefix
        shell: bash
        env:
          RUNNER_PREFIX: ${{ runner.os }}-${{ runner.arch }}-go
          ARCH_PREFIX: ${{ matrix.arch != 'amd64' && format('-{0}', matrix.arch) || '' }}
          RACE_PREFIX: ${{ contains(matrix.flags, '-race') && '-race' || '' }}
        run: echo "cache_prefix=$RUNNER_PREFIX$ARCH_PREFIX$RACE_PREFIX" >> $GITHUB_ENV

      - name: Set up cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: ${{ env.cache_prefix }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ env.cache_prefix }}-

      - name: Run tests
        env:
          GOARCH: ${{ matrix.arch }}
          GOFLAGS: ${{ matrix.flags }}
          TEST_ARGS: ${{ inputs.test-args }}
        run: go test --timeout 30m $TEST_ARGS ./...
