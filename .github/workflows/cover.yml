name: cover

on:
  workflow_call:
    inputs:
      go:
        description: "Go version"
        default: "oldstable"
        required: false
        type: string
      go-version-file:
        description: "Path to a go.mod/go.work/.go-version/.tool-versions file to read the Go version from. Takes precedence over `go` when set."
        default: ""
        required: false
        type: string
      submodules:
        description: "Whether to checkout submodules"
        default: true
        required: false
        type: boolean
      coverage-cmd:
        description: "Command that produces profile.out"
        default: "make coverage"
        required: false
        type: string
      timeout-minutes:
        description: "Job timeout in minutes (minimum 15)"
        default: 30
        required: false
        type: number
      use-oidc:
        description: "Whether to use OIDC for Codecov authentication"
        default: false
        required: false
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: ${{ inputs.submodules }}

      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # go-version-file wins when set; setup-go treats an empty go-version
          # as unset, and go-version would otherwise take precedence over it.
          go-version: ${{ inputs.go-version-file == '' && inputs.go || '' }}
          go-version-file: ${{ inputs.go-version-file }}
          cache: false

      - name: Get Go environment
        id: go-env
        run: |
          echo "cache=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $GITHUB_ENV

      - name: Set up cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: coverage-${{ runner.os }}-${{ runner.arch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            coverage-${{ runner.os }}-${{ runner.arch }}-go-

      - name: Verify coverage command
        env:
          COVERAGE_CMD: ${{ inputs.coverage-cmd }}
        run: |
          cmd="${COVERAGE_CMD%% *}"
          if ! command -v "$cmd" >/dev/null 2>&1; then
            echo "::error::Command not found: $cmd"
            exit 1
          fi
          if [ "$cmd" = "make" ]; then
            target="${COVERAGE_CMD#make }"
            target="${target%% *}"
            make -n "$target" >/dev/null 2>&1 || {
              echo "::error::Makefile target '$target' not found — add a '$target' target to your Makefile"
              exit 1
            }
          fi

      - name: Run tests with coverage
        env:
          COVERAGE_CMD: ${{ inputs.coverage-cmd }}
        run: $COVERAGE_CMD

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: profile.out
          if-no-files-found: error
          retention-days: 1

  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - run
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage

      - name: Send coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: ${{ inputs.use-oidc }}
          files: profile.out
          fail_ci_if_error: true
